version: 0.0
os: linux

files:
  - source: app/
    destination: /var/www/html/

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 60
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: root

  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 60
      runas: root
